{% load static %}
{% load i18n %}

{% if video_id %}
<div class="video-player-container">
    <div class="video-thumbnail" onclick="openVideoModal('{{ video_id }}', '{{ title|escapejs }}')">
        <img src="{{ thumbnail_max }}" 
             onerror="this.onerror=null; this.src='{{ thumbnail_hq }}';"
             alt="{% trans 'Video thumbnail' %} - {{ title }}" 
             loading="lazy">
        <div class="play-button">
            <i class="fas fa-play"></i>
        </div>
        <div class="video-overlay">
            <div class="video-title">{{ title }}</div>
            <div class="video-subtitle">{% trans "Click to play video" %}</div>
        </div>
    </div>
</div>

<div id="videoModal" class="video-modal" onclick="closeVideoModal()">
    <div class="video-modal-content" onclick="event.stopPropagation()">
        <div class="video-modal-header">
            <h3 id="videoModalTitle">{{ title }}</h3>
            <button class="video-close-btn" onclick="closeVideoModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="video-modal-body">
            <div class="video-wrapper">
                <iframe id="videoFrame" 
                        src="" 
                        frameborder="0" 
                        allowfullscreen
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        referrerpolicy="strict-origin-when-cross-origin">
                </iframe>
            </div>
        </div>
    </div>
</div>

<style>
.video-player-container {
    margin: 30px auto;
    max-width: 600px;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    transition: all 0.3s ease;
}

.video-player-container:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
}

.video-thumbnail {
    position: relative;
    cursor: pointer;
    overflow: hidden;
    aspect-ratio: 16/9;
}

.video-thumbnail img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: all 0.3s ease;
}

.video-thumbnail:hover img {
    transform: scale(1.05);
}

.play-button {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, #D4AF37 0%, #B8860B 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #1a1410;
    font-size: 22px;
    transition: all 0.3s ease;
    box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
}

body.light .play-button {
    background: linear-gradient(135deg, #8B6F47 0%, #6B5435 100%);
    color: #F5F5DC;
    box-shadow: 0 6px 20px rgba(139, 111, 71, 0.4);
}

.video-thumbnail:hover .play-button {
    transform: translate(-50%, -50%) scale(1.1);
    box-shadow: 0 10px 30px rgba(212, 175, 55, 0.6);
}

body.light .video-thumbnail:hover .play-button {
    box-shadow: 0 10px 30px rgba(139, 111, 71, 0.6);
}

.play-button i {
    margin-left: 3px;
}

.video-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
    padding: 20px 15px 15px;
    color: white;
    transform: translateY(100%);
    transition: all 0.3s ease;
}

.video-thumbnail:hover .video-overlay {
    transform: translateY(0);
}

.video-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 4px;
}

.video-subtitle {
    font-size: 13px;
    opacity: 0.9;
}

.video-modal {
    display: none;
    position: fixed;
    z-index: 10000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.9);
    backdrop-filter: blur(10px);
    animation: fadeIn 0.3s ease;
}

.video-modal.show {
    display: flex;
    align-items: center;
    justify-content: center;
}

.video-modal-content {
    background: rgba(26, 20, 16, 0.95);
    border-radius: 15px;
    width: 90%;
    max-width: 900px;
    max-height: 90vh;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    border: 2px solid rgba(212, 165, 116, 0.3);
}

body.light .video-modal-content {
    background: rgba(255, 255, 255, 0.95);
    border-color: rgba(139, 111, 71, 0.3);
}

.video-modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    border-bottom: 2px solid rgba(212, 165, 116, 0.2);
}

body.light .video-modal-header {
    border-bottom-color: rgba(139, 111, 71, 0.2);
}

.video-modal-header h3 {
    color: #D4AF37;
    font-size: 18px;
    font-weight: 700;
    margin: 0;
}

body.light .video-modal-header h3 {
    color: #8B6F47;
}

.video-close-btn {
    background: none;
    border: none;
    color: #D4AF37;
    font-size: 22px;
    cursor: pointer;
    padding: 5px;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
}

body.light .video-close-btn {
    color: #8B6F47;
}

.video-close-btn:hover {
    background: rgba(212, 165, 116, 0.2);
    transform: rotate(90deg);
}

body.light .video-close-btn:hover {
    background: rgba(139, 111, 71, 0.2);
}

.video-modal-body {
    padding: 0;
}

.video-wrapper {
    position: relative;
    width: 100%;
    height: 0;
    padding-bottom: 56.25%;
}

.video-wrapper iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

[dir="rtl"] .play-button i {
    margin-left: 0;
    margin-right: 3px;
}

[dir="rtl"] .video-modal-header {
    flex-direction: row-reverse;
}

@media (max-width: 768px) {
    .video-player-container {
        max-width: 100%;
        margin: 20px 0;
    }
    
    .video-modal-content {
        width: 95%;
        margin: 20px;
    }
    
    .play-button {
        width: 50px;
        height: 50px;
        font-size: 18px;
    }
    
    .video-title {
        font-size: 14px;
    }
    
    .video-subtitle {
        font-size: 11px;
    }
    
    .video-modal-header {
        padding: 12px 15px;
    }
    
    .video-modal-header h3 {
        font-size: 16px;
    }
    
    .video-close-btn {
        width: 32px;
        height: 32px;
        font-size: 20px;
    }
}

@media (max-width: 480px) {
    .video-player-container {
        border-radius: 10px;
    }
    
    .play-button {
        width: 45px;
        height: 45px;
        font-size: 16px;
    }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes slideUp {
    from { 
        opacity: 0;
        transform: translateY(50px);
    }
    to { 
        opacity: 1;
        transform: translateY(0);
    }
}

.video-modal.show .video-modal-content {
    animation: slideUp 0.4s ease;
}
</style>

<script>
function openVideoModal(videoId, title) {
    const modal = document.getElementById('videoModal');
    const iframe = document.getElementById('videoFrame');
    const modalTitle = document.getElementById('videoModalTitle');
    
    iframe.src = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1&playsinline=1&enablejsapi=1`;
    
    modalTitle.textContent = title;
    
    modal.classList.add('show');
    modal.style.display = 'flex';
    
    document.body.style.overflow = 'hidden';
}

function closeVideoModal() {
    const modal = document.getElementById('videoModal');
    const iframe = document.getElementById('videoFrame');
    
    modal.classList.remove('show');
    
    setTimeout(() => {
        modal.style.display = 'none';
        iframe.src = '';
    }, 300);
    
    document.body.style.overflow = 'auto';
}

document.addEventListener('keydown', function(event) {
    if (event.key === 'Escape') {
        closeVideoModal();
    }
});

document.addEventListener('DOMContentLoaded', function() {
    const modalContent = document.querySelector('.video-modal-content');
    if (modalContent) {
        modalContent.addEventListener('click', function(event) {
            event.stopPropagation();
        });
    }
});
</script>
{% endif %}
